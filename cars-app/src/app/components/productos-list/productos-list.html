
<div class="grid" *ngIf="!loading; else loader">
  <mat-card class="book" *ngFor="let l of productos">
    <img mat-card-image [src]="'http://localhost:8081/' + (l.fondo || 'fondos/noimage.png')"
           alt="{{l.nombre}}">
    <mat-card-content>
      <h3>{{ l.nombre }}</h3>
      <p class="categoria">{{ l.categoria.nombreCategoria }} </p>
      <p class="stock"><span>Stock: </span>{{ l.stock}}</p>
      <p class="precio">{{ l.precio | currency:'USD' }}</p>
      
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="add(l)">
        <mat-icon>add_shopping_cart</mat-icon> Agregar
      </button>
    </mat-card-actions>
  </mat-card>
</div>

<ng-template #loader>
  <div class="center"><mat-spinner></mat-spinner></div>
</ng-template>
